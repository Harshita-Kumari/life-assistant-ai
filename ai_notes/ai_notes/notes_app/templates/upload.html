<!DOCTYPE html>
<html>
<head>
    <title>AI Study Notes Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            margin-bottom: 15px;
        }

        .link {
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📄 Upload PDFs for AI Notes</h2>

    <!-- Error Message -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- Upload Form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="pdfs" multiple required>

        <br>

        <button type="submit" name="upload_btn">Upload & Generate Notes</button>
    </form>

    

</div>

</body>
</html>
