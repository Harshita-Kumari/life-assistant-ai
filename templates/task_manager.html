<!DOCTYPE html>
<html>
<head>
    <title>Task Manager - Smart Life Assistant</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.6);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius-lg: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        body[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding: 20px; border-radius: var(--radius-lg); background: var(--bg-secondary); border: 1px solid var(--border-color); }
        .btn { padding: 10px 18px; border-radius: 999px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); cursor: pointer; text-decoration: none; }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .task-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 16px; margin-bottom: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .task-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
        .task-title { flex: 1; font-weight: 500; }
        .task-title.completed { text-decoration: line-through; opacity: 0.5; }
        .delete-btn { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 18px; opacity: 0.5; transition: 0.2s; }
        .delete-btn:hover { opacity: 1; }
        .input-group { display: flex; gap: 12px; margin-bottom: 24px; }
        .input-field { flex: 1; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); outline: none; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); padding: 16px; border-radius: 12px; flex: 1; text-align: center; border: 1px solid var(--border-color); }
        .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0;">✅ Task Manager</h1>
                <p style="margin:8px 0 0; opacity:0.7;">Organize your day, get things done.</p>
            </div>
            <a href="/" class="btn">← Back to Chat</a>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div>Total</div></div>
            <div class="stat-card"><div class="stat-val" id="stat-pending">0</div><div>Pending</div></div>
            <div class="stat-card"><div class="stat-val" id="stat-done">0</div><div>Done</div></div>
        </div>

        <div class="input-group">
            <input type="text" id="new-task" class="input-field" placeholder="Add a new task...">
            <button class="btn btn-primary" onclick="addTask()">Add Task</button>
        </div>

        <div id="task-list"></div>
    </div>

    <script>
        let tasks = [];

        async function loadTasks() {
            const res = await fetch('/tasks-api/');
            const data = await res.json();
            tasks = data.tasks;
            renderTasks();
            updateStats();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach(t => {
                list.innerHTML += `
                    <div class="task-card">
                        <input type="checkbox" class="task-checkbox" ${t.is_completed ? 'checked' : ''} onchange="toggleTask(${t.id})">
                        <div class="task-title ${t.is_completed ? 'completed' : ''}">${t.title}</div>
                        <button class="delete-btn" onclick="deleteTask(${t.id})">🗑️</button>
                    </div>
                `;
            });
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = tasks.length;
            document.getElementById('stat-pending').textContent = tasks.filter(t => !t.is_completed).length;
            document.getElementById('stat-done').textContent = tasks.filter(t => t.is_completed).length;
        }

        async function addTask() {
            const input = document.getElementById('new-task');
            const title = input.value.trim();
            if (!title) return;
            await fetch('/tasks-api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'create', title})
            });
            input.value = '';
            loadTasks();
        }

        async function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            await fetch('/tasks-api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'update', task_id: id, is_completed: !task.is_completed})
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch('/tasks-api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'delete', task_id: id})
            });
            loadTasks();
        }

        // Allow Enter key to add task
        document.getElementById('new-task').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        loadTasks();
    </script>
</body>
</html>
