<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Life Assistant - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #030712; --text-primary: #f8fafc; --text-secondary: #94a3b8;
    --accent: #10b981; --accent-hover: #059669; --bg-glass: rgba(15,23,42,0.65);
    --border-color: rgba(148,163,184,0.1); --danger: #ef4444;
}
body { margin:0; font-family:'Inter',sans-serif; height:100vh; background:var(--bg-primary); color:var(--text-primary); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.bg-gradient { position:absolute; inset:-50%; background: radial-gradient(600px 600px at 20% 30%, rgba(16,185,129,0.08), transparent 60%), radial-gradient(600px 600px at 80% 20%, rgba(59,130,246,0.06), transparent 60%); animation: gShift 40s linear infinite; }
@keyframes gShift { 0%{transform:rotate(0deg)} 50%{transform:rotate(180deg) scale(1.08)} 100%{transform:rotate(360deg)} }
.card { position:relative; background:var(--bg-glass); backdrop-filter:blur(32px); border:1px solid var(--border-color); border-radius:24px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.5); z-index:10; animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
h1 { font-size:28px; font-weight:800; margin:0 0 8px 0; background:linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p { color:var(--text-secondary); margin:0 0 32px 0; font-size:14px; }
.form-group { margin-bottom:20px; }
label { display:block; font-size:12px; font-weight:600; margin-bottom:8px; color:var(--text-secondary); }
input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--border-color); border-radius:12px; color:var(--text-primary); font-size:14px; outline:none; transition:0.2s; }
input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(16,185,129,0.15); }
.btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--accent), var(--accent-hover)); border:none; border-radius:12px; color:white; font-weight:700; font-size:14px; cursor:pointer; transition:0.2s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(16,185,129,0.3); }
.links { margin-top:24px; text-align:center; font-size:13px; color:var(--text-secondary); }
.links a { color:var(--accent); text-decoration:none; font-weight:600; }
.links a:hover { text-decoration:underline; }
.error { color:var(--danger); font-size:12px; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="card">
    <h1>Create Account</h1>
    <p>Get your own private, secure AI assistant workspace.</p>
    <div id="error-msg" class="error"></div>
    <form id="signup-form">
        <div class="form-group"><label>Username</label><input type="text" id="username" required placeholder="Choose a username"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="Create a strong password"></div>
        <button type="submit" class="btn">Sign Up</button>
    </form>
    <div class="links">Already have an account? <a href="/login/">Sign In</a></div>
</div>
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    try {
        const res = await fetch('/api/signup/', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}` });
        const data = await res.json();
        if(data.success) window.location.href = data.redirect;
        else { err.textContent = data.error; err.style.display = 'block'; }
    } catch(e) { err.textContent = "Connection failed"; err.style.display = 'block'; }
});
</script>
</body>
</html>
