<!DOCTYPE html>
<html>
<head>
<title>Smart Life Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeAssistant">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: rgba(17, 24, 39, 0.6);
    --bg-glass: rgba(255, 255, 255, 0.03);
    --border-color: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    
    --accent: #06d6a0;
    --accent-hover: #05b88a;
    --accent-glow: rgba(6, 214, 160, 0.4);
    --accent-soft: rgba(6, 214, 160, 0.1);
    
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --primary-glow: rgba(59, 130, 246, 0.4);
    --primary-soft: rgba(59, 130, 246, 0.1);
    
    --purple: #8b5cf6;
    --purple-glow: rgba(139, 92, 246, 0.4);
    --purple-soft: rgba(139, 92, 246, 0.1);
    
    --warning: #fbbf24;
    --warning-soft: rgba(251, 191, 36, 0.1);
    
    --danger: #ef4444;
    --danger-soft: rgba(239, 68, 68, 0.1);
    
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
    --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6);
    
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --radius-full: 9999px;
}

body[data-theme="light"] {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-card: rgba(255, 255, 255, 0.8);
    --bg-glass: rgba(0, 0, 0, 0.02);
    --border-color: rgba(0, 0, 0, 0.06);
    --border-hover: rgba(0, 0, 0, 0.12);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
    --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.15);
}

html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    height: 100vh;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* Animated Background */
.bg-mesh {
    position: fixed; inset: 0; z-index: -1;
    background: 
        radial-gradient(at 0% 0%, rgba(6, 214, 160, 0.15) 0, transparent 50%),
        radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0, transparent 50%),
        radial-gradient(at 0% 100%, rgba(6, 214, 160, 0.1) 0, transparent 50%);
    animation: meshRotate 30s linear infinite;
}
@keyframes meshRotate { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(180deg); } }

/* Floating Orbs */
.orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite; pointer-events: none;
}
.orb-1 { width: 300px; height: 300px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
.orb-2 { width: 400px; height: 400px; background: var(--primary); bottom: -150px; right: -150px; animation-delay: -7s; }
.orb-3 { width: 250px; height: 250px; background: var(--purple); top: 50%; left: 50%; animation-delay: -14s; }
@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 50px) scale(0.9); }
}

.app-container { display: flex; height: 100vh; max-width: 1600px; margin: 0 auto; position: relative; }

/* Sidebar */
.sidebar {
    width: 320px; background: var(--bg-card); backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
    position: relative; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
}
.sidebar-header { padding: 24px; border-bottom: 1px solid var(--border-color); }
.brand { display: flex; align-items: center; gap: 16px; }
.brand-icon {
    width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--primary));
    border-radius: var(--radius-lg); display: grid; place-items: center; font-size: 24px;
    box-shadow: 0 8px 24px var(--accent-glow); position: relative; overflow: hidden;
}
.brand-icon::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2)); }
.brand-text h1 {
    font-size: 18px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-text span { font-size: 12px; color: var(--text-muted); font-weight: 500; }

.sidebar-actions { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
}
.btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1)); opacity: 0; transition: opacity 0.2s; }
.btn:hover::before { opacity: 1; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: white; box-shadow: 0 4px 16px var(--accent-glow); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
.btn-ghost { background: var(--bg-glass); color: var(--text-primary); border: 1px solid var(--border-color); }
.btn-ghost:hover { background: var(--border-color); border-color: var(--border-hover); transform: translateY(-1px); }

.sidebar-search {
    margin: 0 24px 16px; padding: 12px 16px; background: var(--bg-glass);
    border: 1px solid var(--border-color); border-radius: var(--radius-md);
    color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.2s;
}
.sidebar-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.sidebar-search::placeholder { color: var(--text-muted); }

.sidebar-section { padding: 0 24px; margin-bottom: 16px; }
.sidebar-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; padding: 0 4px; }

.conversation-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
.conversation-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; margin-bottom: 6px;
    border-radius: var(--radius-md); background: transparent; border: 1px solid transparent;
    cursor: pointer; transition: all 0.2s;
}
.conversation-item:hover { background: var(--bg-glass); border-color: var(--border-color); transform: translateX(4px); }
.conversation-item.active { background: var(--accent-soft); border-color: var(--accent); }
.conversation-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: all 0.2s; }
.conversation-item.active .conversation-indicator { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
.conversation-info { flex: 1; min-width: 0; }
.conversation-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conversation-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
.conversation-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.conversation-item:hover .conversation-actions { opacity: 1; }
.conv-btn {
    width: 28px; height: 28px; border-radius: var(--radius-sm); border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; display: grid; place-items: center; font-size: 14px; transition: all 0.15s;
}
.conv-btn:hover { background: var(--danger-soft); color: var(--danger); }

/* Main Content */
.main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.main-header {
    padding: 20px 28px; background: var(--bg-card); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.header-left h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.nav-pill {
    padding: 8px 14px; border-radius: var(--radius-full); background: var(--bg-glass);
    border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 12px; font-weight: 600;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
}
.nav-pill:hover { background: var(--border-color); color: var(--text-primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.status-badge {
    padding: 8px 14px; border-radius: var(--radius-full); background: var(--bg-glass);
    border: 1px solid var(--border-color); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
.status-badge.listening .status-dot { background: var(--accent); animation: pulse 2s infinite; box-shadow: 0 0 12px var(--accent-glow); }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

/* Chat Area */
.chat-area { flex: 1; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 16px; }
.chat-empty { margin: auto; text-align: center; animation: fadeInUp 0.6s ease; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.chat-empty-icon { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.chat-empty h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.chat-empty p { color: var(--text-secondary); font-size: 14px; max-width: 400px; }

/* Messages */
.message { display: flex; gap: 14px; max-width: 80%; animation: messageSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes messageSlide { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.ai { align-self: flex-start; }
.message-avatar {
    width: 36px; height: 36px; border-radius: var(--radius-md); display: grid; place-items: center;
    font-size: 18px; flex-shrink: 0; position: relative;
}
.message.user .message-avatar { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); box-shadow: 0 4px 12px var(--primary-glow); }
.message.ai .message-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); box-shadow: 0 4px 12px var(--accent-glow); }
.message-bubble { padding: 14px 18px; border-radius: var(--radius-lg); font-size: 14px; line-height: 1.6; position: relative; }
.message.user .message-bubble { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 16px var(--primary-glow); }
.message.ai .message-bubble { background: var(--bg-card); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; box-shadow: var(--shadow-md); }
.message-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; opacity: 0.7; }

/* Typing Indicator */
.typing-indicator { display: flex; gap: 6px; padding: 4px 0; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: typingBounce 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }

/* Sound Wave Animation */
.sound-wave { display: none; align-items: center; gap: 3px; height: 24px; padding: 0 16px; }
.sound-wave.active { display: flex; }
.sound-bar { width: 3px; height: 100%; background: var(--accent); border-radius: var(--radius-full); animation: soundWave 1s ease-in-out infinite; }
.sound-bar:nth-child(1) { animation-delay: 0s; } .sound-bar:nth-child(2) { animation-delay: 0.1s; }
.sound-bar:nth-child(3) { animation-delay: 0.2s; } .sound-bar:nth-child(4) { animation-delay: 0.3s; }
.sound-bar:nth-child(5) { animation-delay: 0.4s; }
@keyframes soundWave { 0%, 100% { transform: scaleY(0.3); opacity: 0.3; } 50% { transform: scaleY(1); opacity: 1; } }

/* Input Area */
.input-area { padding: 20px 28px; background: var(--bg-card); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); }
.input-container { display: flex; gap: 12px; align-items: center; max-width: 900px; margin: 0 auto; }
.input-field {
    flex: 1; padding: 16px 20px; background: var(--bg-glass); border: 1px solid var(--border-color);
    border-radius: var(--radius-full); color: var(--text-primary); font-size: 15px; font-weight: 500;
    outline: none; transition: all 0.2s;
}
.input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); background: var(--bg-secondary); }
.input-field::placeholder { color: var(--text-muted); }
.send-btn {
    width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    border: none; color: white; font-size: 20px; cursor: pointer; display: grid; place-items: center;
    box-shadow: 0 4px 16px var(--accent-glow); transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 8px 24px var(--accent-glow); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* Mobile */
@media (max-width: 1024px) {
    .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); box-shadow: var(--shadow-xl); }
    .sidebar.open { transform: translateX(0); }
    .mobile-menu-btn { display: grid !important; }
    .nav-pill span { display: none; }
}
@media (max-width: 768px) {
    .chat-area { padding: 20px 16px; } .input-area { padding: 16px; }
    .message { max-width: 90%; } .header-left h2 { font-size: 18px; }
}
.mobile-menu-btn {
    display: none; width: 40px; height: 40px; border-radius: var(--radius-md);
    border: 1px solid var(--border-color); background: var(--bg-glass); color: var(--text-primary);
    font-size: 20px; cursor: pointer; place-items: center;
}
</style>

</head>

<body>
<div class="bg-mesh"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-icon">✦</div>
                <div class="brand-text">
                    <h1>Smart Assistant</h1>
                    <span>AI • Goals • Habits • Voice</span>
                </div>
            </div>
        </div>

        <div class="sidebar-actions">
            <button class="btn btn-primary" onclick="newChat()">
                <span>＋</span> New Chat
            </button>
            <button class="btn btn-ghost" id="voice-btn" onclick="toggleVoice()">
                <span>🎙️</span> Start Voice
            </button>
        </div>

        <input class="sidebar-search" id="search-input" type="text" placeholder="🔍 Search conversations...">

        <div class="sidebar-section">
            <div class="sidebar-section-title">Quick Links</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <a href="/student/" class="nav-pill">🎓 <span>Student</span></a>
                <a href="/tasks/" class="nav-pill">✅ <span>Tasks</span></a>
                <a href="/habits/" class="nav-pill">📊 <span>Habits</span></a>
                <a href="/goals/" class="nav-pill">🎯 <span>Goals</span></a>
                <a href="/history/" class="nav-pill">📜 <span>History</span></a>
                <a href="/media/" class="nav-pill">🎵 <span>Media</span></a>
            </div>
        </div>

        <div class="conversation-list" id="conversation-list"></div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <header class="main-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="header-left">
                    <h2>Chat</h2>
                    <p>Your AI-powered life assistant</p>
                </div>
            </div>
            <div class="header-right">
                <div class="sound-wave" id="sound-wave">
                    <div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div>
                </div>
                <div class="status-badge" id="voice-status">
                    <div class="status-dot"></div>
                    <span>Idle</span>
                </div>
                <button id="wake-word-toggle" class="btn btn-ghost" onclick="toggleWakeWordMode()" title="Toggle Wake Word Mode">👁️ Wake Word: OFF</button>
                <button id="agent-toggle-btn" class="btn btn-ghost" onclick="toggleAgent()" title="Toggle Agent Mode">🤖 Agent: OFF</button>
                <button class="btn btn-ghost" onclick="toggleTheme()" style="padding:10px 14px;">🌙</button>
            </div>
        </header>

        <div class="chat-area" id="chat"></div>

        <div class="input-area">
            <div class="input-container">
                <input class="input-field" id="input" type="text" placeholder="Type your message or use voice input...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </main>
</div>

<script>
// Global Speech State
let isSpeaking = false;
let selectedVoice = null;
let speechBuffer = "";
let watchdogInterval = null;
let streamFinished = false; // Flag to know when to flush incomplete sentences

// Load voices and pick the MOST NATURAL one available
function initVoice() {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) return;

    console.log(`🔊 Found ${voices.length} voices. Selecting best one...`);

    // 1. Try to find "Google US English"
    let bestVoice = voices.find(v => v.name.includes("Google") && v.lang === "en-US");

    // 2. Try to find any "Google" English voice
    if (!bestVoice) {
        bestVoice = voices.find(v => v.name.includes("Google") && v.lang.startsWith('en'));
    }

    // 3. Try to find "Microsoft" English voice
    if (!bestVoice) {
        bestVoice = voices.find(v => v.name.includes("Microsoft") && v.lang.startsWith('en'));
    }

    // 4. Fallback to any English voice
    if (!bestVoice) {
        bestVoice = voices.find(v => v.lang.startsWith('en'));
    }
    
    // 5. Absolute fallback
    if (!bestVoice && voices.length > 0) {
        bestVoice = voices[0];
    }

    if (bestVoice) {
        selectedVoice = bestVoice;
        console.log(`✅ Selected Voice: ${selectedVoice.name} (${selectedVoice.lang})`);
    } else {
        console.warn("⚠️ No suitable voice found.");
    }
}

// Initialize voices (they load asynchronously)
window.speechSynthesis.onvoiceschanged = initVoice;
initVoice(); // Try immediately just in case

// FIX: Chrome "Speech Hang" Watchdog
// This keeps the voice engine alive during long stories by pausing/resuming every 5s
function startWatchdog() {
    if (watchdogInterval) return;
    console.log("🐕 Watchdog started.");
    watchdogInterval = setInterval(() => {
        // If speech is active, force a pause/resume cycle to prevent the browser from going silent
        if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
            window.speechSynthesis.pause();
            window.speechSynthesis.resume();
        }
        // If it's paused, resume it
        else if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
        }
    }, 6000); // Every 6 seconds
}

function stopWatchdog() {
    if (watchdogInterval) {
        clearInterval(watchdogInterval);
        watchdogInterval = null;
    }
    console.log("🛑 Watchdog stopped.");
}

// Speak the next sentence in the buffer
function speakNextSentence() {
    // MUTEX: Prevent double-firing (Race Condition Fix)
    // If we are already locked or the browser is speaking, stop.
    // This prevents the "two times" bug where the loop and the callback trigger simultaneously.
    if (isSpeakingLocked || window.speechSynthesis.speaking || window.speechSynthesis.pending) {
        return;
    }

    // Clean up text for speech
    let cleanBuffer = speechBuffer
        .replace(/\*\*/g, '') // Bold
        .replace(/\*/g, '')   // Italic
        .replace(/__/g, '')   // Underline
        .replace(/`/g, '')    // Code
        .replace(/#/g, '')    // Headers
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // Links -> Just text
        .replace(/https?:\/\/\S+/g, 'link') // URLs -> "link"
        .trim();

    speechBuffer = cleanBuffer; // Update global buffer

    if (!speechBuffer) {
        // If buffer is empty, check if we are done
        if (streamFinished) {
            stopWatchdog();
            isSpeaking = false;
            console.log("✅ Speech complete.");
        }
        return;
    }

    // Find the first sentence
    // Regex explanation:
    // ^(.*?[.!?]+) -> Match up to punctuation
    // [\s\n]*     -> Consume trailing whitespace/newlines
    const sentenceMatch = speechBuffer.match(/^(.*?[.!?]+)\s*/);

    let sentenceToSpeak = "";

    if (sentenceMatch) {
        sentenceToSpeak = sentenceMatch[1].trim();
        // Remove the spoken part from the buffer IMMEDIATELY to prevent re-reading
        speechBuffer = speechBuffer.substring(sentenceMatch[0].length);
    } else if (streamFinished) {
        // If stream is finished and no punctuation, speak the rest
        sentenceToSpeak = speechBuffer;
        speechBuffer = ""; // Clear buffer immediately
    } else {
        // Waiting for more text to form a sentence
        return;
    }

    if (!sentenceToSpeak.trim()) {
        speakNextSentence(); // Retry with remaining buffer
        return;
    }

    console.log(`🗣️ Speaking: "${sentenceToSpeak.substring(0, 30)}..."`);

    // LOCK: Mark as active immediately to block other calls
    isSpeakingLocked = true;
    lastAiSpeechTime = Date.now(); // Track when AI starts speaking

    // Chrome Bug Fix: Sometimes the speech queue gets "stuck"
    if (window.speechSynthesis.pending && !window.speechSynthesis.speaking) {
        console.log("⚠️ Speech queue stuck. Resetting...");
        window.speechSynthesis.cancel();
    }

    // Create utterance
    const utterance = new SpeechSynthesisUtterance(sentenceToSpeak);
    if (selectedVoice) utterance.voice = selectedVoice;

    // Use the global assistantVolume setting
    utterance.volume = assistantVolume;

    // Natural settings
    utterance.rate = 1.0;
    utterance.pitch = 1.0;

    // When this sentence finishes, UNLOCK and speak the next one
    utterance.onend = () => {
        isSpeakingLocked = false;
        console.log("🔓 Unlocked. Checking for more text...");
        speakNextSentence();
    };

    utterance.onerror = (event) => {
        console.warn("⚠️ Speech error:", event.error);
        isSpeakingLocked = false; // Unlock on error
        // Try to recover and speak the next sentence
        speakNextSentence();
    };

    // Add to system queue
    window.speechSynthesis.speak(utterance);
    isSpeaking = true;
}

// Handle stopping
function stopAllSpeech() {
    stopWatchdog(); // Stop the background fix
    window.speechSynthesis.cancel();
    speechBuffer = "";
    streamFinished = false;
    isSpeaking = false;
}

// Send Message (Streaming Version)
async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    // Stop any ongoing speech before starting new message
    stopAllSpeech();
    speechQueue = [];
    isSpeaking = false;

    input.value = '';
    addUserMessage(text);
    
    // Create AI message bubble for streaming
    const chat = document.getElementById('chat');
    const aiDiv = document.createElement('div');
    aiDiv.className = 'message ai';
    aiDiv.innerHTML = `
        <div class="message-avatar">✦</div>
        <div>
            <div class="message-bubble" id="streaming-bubble"></div>
            <div class="message-time"></div>
        </div>
    `;
    chat.appendChild(aiDiv);
    chat.scrollTop = chat.scrollHeight;
    const bubble = aiDiv.querySelector('.message-bubble');
    bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

    // Instant open for songs/search
    const songMatch = text.match(/^(?:play|search|find|open)\s+(?:song|music|video|on youtube)?\s+(.+)$/i);
    if (songMatch && songMatch[1].trim().length > 1) {
        const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(songMatch[1].trim())}`;
        window.open(url, '_blank');
    }

    try {
        const response = await fetch('/chat-stream-api/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, conv_id: currentConv})
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';
        speechBuffer = ""; // Reset global buffer
        streamFinished = false;
        isSpeaking = true;
        startWatchdog(); // Start watchdog immediately

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, {stream: true});
            buffer += chunk;

            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));

                        if (data.token) {
                            if (fullText.length === 0) bubble.innerHTML = '';
                            fullText += data.token;
                            bubble.innerHTML = fullText.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
                            chat.scrollTop = chat.scrollHeight;

                            // Just add text to the buffer. The recursive function will pick it up.
                            speechBuffer += data.token;
                        } else if (data.response) {
                            // Handle immediate response (e.g., "Opening YouTube") from auto commands
                            // OR the final chunk of a stream which contains the full response.
                            
                            // CRITICAL FIX: Only append to speechBuffer if we haven't streamed tokens yet.
                            // If fullText > 0, speechBuffer already contains the text from tokens.
                            // Appending data.response here would cause the assistant to speak the whole text TWICE.
                            if (fullText.length === 0) {
                                speechBuffer += data.response;
                                bubble.innerHTML = ''; // Clear typing indicator if present
                            }
                            
                            // Update fullText if empty
                            if (fullText.length === 0) {
                                fullText = data.response;
                                bubble.innerHTML = fullText.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
                                chat.scrollTop = chat.scrollHeight;
                            }
                        }

                        // Check for actions (like opening websites or timers)
                        if (data.action) {
                            if (data.action.type === 'open_url') {
                                console.log("🌐 Opening URL:", data.action.url);
                                window.open(data.action.url, '_blank');
                            } else if (data.action.type === 'set_timer') {
                                console.log("⏱️ Setting timer:", data.action.seconds, data.action.label);
                                startTimer(data.action.seconds, data.action.label);
                            } else if (data.action.type === 'refresh_tasks') {
                                console.log("✅ Task updated.");
                            } else if (data.action.type === 'refresh_student') {
                                console.log("🎓 Student data updated.");
                            } else if (data.action.type === 'adjust_volume') {
                                handleVolumeChange(data.action.value);
                            }
                        }

                        // Handle Agent Logs
                        if (data.agent_log) {
                            const log = document.getElementById('agent-log');
                            if(log) {
                                log.innerHTML += '<div>' + data.agent_log + '</div>';
                                log.scrollTop = log.scrollHeight;
                                document.getElementById('agent-status').textContent = 'Working...';
                                setTimeout(() => { document.getElementById('agent-status').textContent = 'Idle'; }, 2000);
                            }
                        }

                        if (data.done) {
                            // Mark stream as finished so the recursive function speaks the last fragment
                            streamFinished = true;
                            console.log("📡 Stream finished. Flushing buffer...");
                            
                            // Trigger the final flush
                            speakNextSentence();

                            if (data.conv_id) {
                                currentConv = data.conv_id;
                                localStorage.setItem('lastConvId', currentConv);
                                loadConversations();
                            }
                            if (data.detected_mood && data.detected_mood !== 'neutral') {
                                const moodEmojis = { 'stressed': '😰', 'worried': '😟', 'sad': '😢', 'lonely': '😔', 'angry': '😠', 'happy': '😊', 'grateful': '🙏', 'tired': '😴', 'confused': '😕', 'hopeful': '🌟', 'scared': '😨', 'crisis': '🆘' };
                                const moodEmoji = moodEmojis[data.detected_mood] || '';
                                bubble.innerHTML += `<br><br><small style="opacity:0.6;">${moodEmoji} Mood: ${data.detected_mood}</small>`;
                            }
                        }
                    } catch (e) {}
                }
            }
            
            // Trigger speech processing continuously as buffer fills
            speakNextSentence();
        }
        
        if (fullText.toLowerCase().includes("stopped!")) {
            stopAllSpeech();
            for (const [id, timer] of activeTimers.entries()) { clearTimeout(timer); activeTimers.delete(id); }
        }

    } catch (err) {
        bubble.innerHTML = 'Error connecting to assistant';
    }
}

// Conversations
function loadConversations() {
    fetch('/conversations-api/').then(r => r.json()).then(data => {
        allConversations = data.conversations || [];
        renderConversationList();
    }).catch(() => {});
}

function renderConversationList() {
    const list = document.getElementById('conversation-list');
    const query = (document.getElementById('search-input')?.value || '').toLowerCase();
    const filtered = allConversations.filter(c => !query || (c.title || '').toLowerCase().includes(query));
    list.innerHTML = filtered.map(c => `
        <div class="conversation-item ${c.id == currentConv ? 'active' : ''}" onclick="loadConversation(${c.id})">
            <div class="conversation-indicator"></div>
            <div class="conversation-info">
                <div class="conversation-title">${escapeHtml(c.title || 'New Chat')}</div>
                <div class="conversation-preview">${escapeHtml(c.preview || '')}</div>
            </div>
            <div class="conversation-actions">
                <button class="conv-btn" onclick="event.stopPropagation(); deleteConversation(${c.id})">🗑</button>
            </div>
        </div>
    `).join('');
}

function loadConversation(id) {
    currentConv = id;
    localStorage.setItem('lastConvId', id);
    renderConversationList();
    fetch(`/load-chat/?conv_id=${id}`).then(r => r.json()).then(data => {
        const chat = document.getElementById('chat');
        chat.innerHTML = '';
        if (data.messages?.length) {
            data.messages.forEach(m => {
                if (m.message) addUserMessage(m.message);
                if (m.response) addAIMessage(m.response);
            });
        } else { setEmptyState(); }
    });
}

function newChat() {
    currentConv = null;
    localStorage.removeItem('lastConvId');
    document.getElementById('chat').innerHTML = '';
    setEmptyState();
    renderConversationList();
}

async function deleteConversation(id) {
    if (!confirm('Delete this conversation?')) return;
    await fetch(`/delete-conversation/${id}/`, {method: 'POST'});
    loadConversations();
    if (currentConv == id) newChat();
}

// Voice
let continuousMode = false;
let micResumeInterval = null;

function startContinuousCheck() {
    if (micResumeInterval) clearInterval(micResumeInterval);
    micResumeInterval = setInterval(() => {
        if (continuousMode && !isListening) {
            // Check if AI is silent and not pending more speech
            const synth = window.speechSynthesis;
            if (!synth.speaking && !synth.pending) {
                console.log("🔄 AI is silent. Resuming mic...");
                startVoice();
            }
        }
    }, 1000);
}

function toggleVoice() {
    console.log("🎙️ Toggle Voice clicked. isListening:", isListening);
    // If we are already listening, stop.
    // If we are NOT listening, ALWAYS start.
    if (isListening) {
        stopVoice();
    } else {
        startVoice();
    }
}

function startVoice() {
    console.log("🎙️ Attempting to start Voice...");

    // 1. Check Browser Support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("❌ Voice NOT supported in this browser.\n\nPlease use Google Chrome or Microsoft Edge.");
        return;
    }

    // 2. Check Secure Context
    if (!window.isSecureContext && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        alert("⚠️ Voice Blocked!\n\nYour browser blocks the microphone on non-secure connections.\n\nPlease open this page at http://localhost:8000/ or https://");
        return;
    }

    // 3. Abort old session if exists
    if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
    }

    // Create a NEW instance for this session
    const myRec = new SpeechRecognition();
    recognition = myRec; // Update global reference

    myRec.continuous = true;
    myRec.interimResults = false;
    myRec.lang = 'en-US';
    myRec.maxAlternatives = 1;

    // Enable continuous mode
    continuousMode = true;
    if (micResumeInterval) clearInterval(micResumeInterval); // Clear any old interval

    // 5. Event Handlers (Use myRec to capture this instance)
    myRec.onstart = () => {
        isListening = true;
        updateVoiceUI(true);
        console.log("✅✅✅ Microphone ACTIVE. Speak now...");
        stopAllSpeech();
    };

    myRec.onresult = (event) => {
        const lastIdx = event.results.length - 1;
        const text = event.results[lastIdx][0].transcript;
        const confidence = event.results[lastIdx][0].confidence;
        console.log(`🗣️🗣️🗣️ Heard: "${text}" (${Math.round(confidence*100)}%)`);

        // CRITICAL: Double-check to prevent feedback loop
        // 1. Ignore if AI is currently talking (allows interruption)
        if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
            console.log("⏸️ Ignoring result: AI is speaking.");
            return;
        }

        // 2. Ignore if AI *just* stopped talking (prevents echo/loop)
        // 1200ms cooldown after AI finishes a sentence
        const timeSinceAiSpoke = Date.now() - lastAiSpeechTime;
        if (timeSinceAiSpoke < 1200) {
            console.log(`⏸️ Ignoring echo: AI spoke ${timeSinceAiSpoke}ms ago.`);
            return;
        }

        // --- WAKE WORD LOGIC ---
        if (wakeWordMode) {
            const lowerText = text.toLowerCase().trim();
            let wakeWordFound = null;
            let command = "";

            for (const word of WAKE_WORDS) {
                if (lowerText.includes(word)) {
                    wakeWordFound = word;
                    // Extract command part after the wake word
                    const parts = lowerText.split(word);
                    if (parts.length > 1) {
                        command = parts[parts.length - 1].trim();
                    }
                    break;
                }
            }

            if (wakeWordFound) {
                console.log(`✅ Wake Word Detected: "${wakeWordFound}"`);
                if (command.length > 2) {
                    // We have a command!
                    document.getElementById('input').value = command;
                    sendMessage();
                } else {
                    // Just the wake word was said
                    console.log("👀 Listening for command...");
                    // Visual feedback
                    updateVoiceUI(false);
                    setTimeout(() => { if(isListening) updateVoiceUI(true); }, 500);
                    // Optional: AI could acknowledge, but risky for feedback loop.
                    // addAIMessage("Listening..."); 
                }
            } else {
                console.log(`⏳ Waiting for wake word... (Heard: "${text}")`);
                // No action, keep listening
            }
            return; // Handled in wake word mode
        }
        // -----------------------

        if (text && text.trim().length > 0) {
            console.log("📝 Processing result...");

            // Flash UI to show we heard something
            updateVoiceUI(false);
            setTimeout(() => { if(isListening) updateVoiceUI(true); }, 300);

            document.getElementById('input').value = text;
            sendMessage();
            // Mic stays on!
        }
    };

    myRec.onerror = (event) => {
        console.error("❌❌❌ Mic Error:", event.error);
        if (event.error === 'not-allowed') {
            alert("🚫 Microphone Blocked!\n\nClick the 🔒 Lock Icon in the address bar and allow Microphone access.");
            stopVoice();
        } else if (event.error === 'network') {
            console.log("🌐 Network Error. Mic will restart in 3 seconds...");
            setTimeout(() => { if(continuousMode && recognition === myRec) restartMic(myRec); }, 3000);
        } else if (event.error === 'no-speech') {
            console.log("⏳ No speech detected. Mic will stay open...");
        } else if (event.error === 'aborted') {
            console.log("⏹️ Mic aborted.");
        } else {
            console.log("⚠️ Other mic error:", event.error);
        }
    };

    myRec.onend = () => {
        console.log("🛑 Mic session ended.");
        
        // If this is an old instance that was replaced, ignore it
        if (recognition !== myRec) {
            console.log("🗑️ Ignoring onend for old instance.");
            return;
        }

        isListening = false;
        updateVoiceUI(false);
        
        // If continuous mode is on, attempt to restart mic when AI is silent
        if (continuousMode) {
            console.log("🔄 Continuous mode active. Waiting for silence to restart...");
            // Use a polling check to wait for AI to finish speaking
            const checkAndRestart = setInterval(() => {
                // If mode was turned off or instance changed, stop waiting
                if (!continuousMode || recognition !== myRec) {
                    clearInterval(checkAndRestart);
                    return;
                }

                if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                    clearInterval(checkAndRestart);
                    console.log("✅ AI silent. Restarting mic...");
                    restartMic(myRec);
                }
            }, 500);
        }
    };

    // 6. GO!
    try {
        isListening = true;
        myRec.start();
        console.log("🎙️ recognition.start() called successfully.");
    } catch(e) {
        console.error("❌❌❌ Start failed:", e);
        isListening = false;
        updateVoiceUI(false);
    }
}

// Helper to safely restart the mic
function restartMic(myRec) {
    if (!continuousMode) {
        console.log("🚫 Continuous mode is OFF. Not restarting.");
        return;
    }
    
    // If the instance was replaced, don't restart it
    if (recognition !== myRec) {
        console.log("🚫 Recognition instance changed. Not restarting old one.");
        return;
    }

    console.log("🔄 Attempting to restart mic...");

    try {
        // Try to start the existing object.
        // Note: Browsers may block this if not triggered by user interaction.
        myRec.start();
        isListening = true;
        updateVoiceUI(true);
        console.log("🎙️ Mic restarted on existing instance.");
    } catch(e) {
        console.warn("⚠️ Restart on existing instance failed. Trying full re-init...", e);
        
        // Fallback: Try to start a completely new instance
        // This helps if the old object is in a bad state
        startVoice();
        
        // Check if startVoice actually succeeded
        // startVoice sets isListening = true on success, false on failure
        if (!isListening) {
            console.error("❌❌❌ Auto-restart blocked by browser security.");
            
            // Show a visual notification in the chat
            const chat = document.getElementById('chat');
            const notification = document.createElement('div');
            notification.className = 'message ai';
            notification.style.background = '#ff4444'; // Red background for alert
            notification.style.color = 'white';
            notification.innerHTML = `
                <div class="message-avatar">⚠️</div>
                <div>
                    <div class="message-bubble">
                        <b>Listening Paused</b><br>
                        Your browser blocked the auto-restart for security reasons.<br>
                        <button onclick="startVoice()" style="margin-top:8px; padding:4px 8px; cursor:pointer;">Resume Listening</button>
                    </div>
                </div>
            `;
            chat.appendChild(notification);
            chat.scrollTop = chat.scrollHeight;
            
            updateVoiceUI(false);
        }
    }
}

function stopVoice() {
    console.log("🛑 stopVoice called.");
    isListening = false;
    continuousMode = false; // Disable continuous mode
    if (micResumeInterval) {
        clearInterval(micResumeInterval);
        micResumeInterval = null;
    }
    updateVoiceUI(false);

    if (recognition) {
        try {
            recognition.stop();
            console.log("🛑 Mic stopped gracefully.");
        } catch(e) {
            console.log("⚠️ Mic stop error:", e);
        }
        recognition = null;
    }
}

// Complete speech stop - clears queue and stops all speech synthesis
function stopAllSpeech() {
    stopWatchdog(); // Stop the background fix
    window.speechSynthesis.cancel();
    speechBuffer = "";
    isSpeaking = false;
}

function updateVoiceUI(listening) {
    const btn = document.getElementById('voice-btn');
    const status = document.getElementById('voice-status');
    const wave = document.getElementById('sound-wave');
    if (listening) {
        btn.innerHTML = '<span>⏹</span> Stop Voice';
        status.className = 'status-badge listening';
        status.querySelector('span').textContent = 'Listening';
        wave.classList.add('active');
    } else {
        btn.innerHTML = '<span>🎙️</span> Start Voice';
        status.className = 'status-badge';
        status.querySelector('span').textContent = 'Idle';
        wave.classList.remove('active');
    }
}

// Utilities
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

function handleVolumeChange(value) {
    console.log(`🔊 Volume adjustment requested: ${value}`);
    
    if (value === 'up') {
        assistantVolume = Math.min(1.0, assistantVolume + 0.2);
        addAIMessage(`🔊 Volume increased to ${Math.round(assistantVolume * 100)}%`);
    } else if (value === 'down') {
        assistantVolume = Math.max(0.0, assistantVolume - 0.2);
        addAIMessage(`🔉 Volume decreased to ${Math.round(assistantVolume * 100)}%`);
    } else if (value === 'mute') {
        assistantVolume = 0.0;
        addAIMessage("🔇 Assistant is now muted.");
    } else if (value === 'unmute') {
        assistantVolume = 1.0;
        addAIMessage("🔊 Assistant unmuted.");
    }
    
    // Update UI if needed
    const status = document.getElementById('voice-status');
    if (status && assistantVolume === 0) {
        status.querySelector('span').textContent = "Muted";
    } else if (status && assistantVolume > 0) {
        status.querySelector('span').textContent = isListening ? "Listening" : "Idle";
    }
}
function startTimer(seconds, label) {
    const id = ++timerSeq;
    const timeoutId = setTimeout(() => { 
        activeTimers.delete(id); 
        addAIMessage(`⏰ ${label} finished!`); 
    }, seconds * 1000);
    activeTimers.set(id, timeoutId);
    // Note: The "Timer set..." message is handled by the AI response text.
}

function toggleAgent() {
    autonomousMode = !autonomousMode;
    const panel = document.getElementById('agent-panel');
    const toggle = document.getElementById('agent-toggle-btn');
    panel.style.display = autonomousMode ? 'block' : 'none';
    if(toggle) {
        toggle.textContent = autonomousMode ? '🤖 Agent: ON' : '🤖 Agent: OFF';
        toggle.style.background = autonomousMode ? 'var(--accent-soft)' : '';
    }
    
    addAIMessage(autonomousMode ? "🤖 **Autonomous Mode Enabled.** Give me a goal and I'll plan & execute it step-by-step." : "🤖 Agent mode disabled.");
    const log = document.getElementById('agent-log');
    if(log) log.innerHTML += `<div>➡️ Mode: ${autonomousMode ? 'Active' : 'Disabled'}</div>`;
}

// Intercept sendMessage to add autonomous flag
const originalSendMessage = sendMessage;
sendMessage = async function() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    
    // Temporarily override fetch payload
    const originalFetch = window.fetch;
    window.fetch = async (url, opts) => {
        if (url.includes('chat-stream-api')) {
            try {
                let body = JSON.parse(opts.body);
                body.autonomous = autonomousMode;
                opts.body = JSON.stringify(body);
            } catch(e) {}
        }
        return originalFetch(url, opts);
    };
    
    await originalSendMessage();
    window.fetch = originalFetch;
};

`;
