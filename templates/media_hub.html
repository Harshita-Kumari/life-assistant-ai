<!DOCTYPE html>
<html>
<head>
    <title>Media Hub - Smart Life Assistant</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.6);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --radius-lg: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        body[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding: 20px; border-radius: var(--radius-lg); background: var(--bg-secondary); border: 1px solid var(--border-color); }
        .btn { padding: 10px 18px; border-radius: 999px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); cursor: pointer; text-decoration: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .platform-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 12px; 
            text-align: center; cursor: pointer; transition: 0.2s; text-decoration: none; color: var(--text-primary);
        }
        .platform-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .platform-icon { font-size: 40px; margin-bottom: 12px; }
        .platform-name { font-weight: 600; }

        .search-box { display: flex; gap: 12px; margin-bottom: 32px; }
        .input-field { flex: 1; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); outline: none; }
        .mini-btn { padding: 12px 24px; border-radius: 999px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; }
        
        .controls { display: flex; gap: 12px; justify-content: center; margin-top: 40px; }
        .control-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 20px; cursor: pointer; display: grid; place-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0;">🎵 Media Hub</h1>
                <p style="margin:8px 0 0; opacity:0.7;">Control your entertainment hands-free.</p>
            </div>
            <a href="/" class="btn">← Back to Chat</a>
        </div>

        <div class="search-box">
            <input type="text" id="media-search" class="input-field" placeholder="Search across all platforms...">
            <button class="mini-btn" onclick="searchMedia('youtube')">Search</button>
        </div>

        <div class="grid">
            <a href="https://www.youtube.com" target="_blank" class="platform-card">
                <div class="platform-icon" style="color: #ff0000;">▶️</div>
                <div class="platform-name">YouTube</div>
            </a>
            <a href="https://open.spotify.com" target="_blank" class="platform-card">
                <div class="platform-icon" style="color: #1db954;">🎵</div>
                <div class="platform-name">Spotify</div>
            </a>
            <a href="https://www.netflix.com" target="_blank" class="platform-card">
                <div class="platform-icon" style="color: #e50914;">🎬</div>
                <div class="platform-name">Netflix</div>
            </a>
            <a href="https://soundcloud.com" target="_blank" class="platform-card">
                <div class="platform-icon" style="color: #ff5500;">☁️</div>
                <div class="platform-name">SoundCloud</div>
            </a>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="sendVoiceCommand('Volume up')">🔊</button>
            <button class="control-btn" onclick="sendVoiceCommand('Volume down')">🔉</button>
            <button class="control-btn" onclick="sendVoiceCommand('Mute')">🔇</button>
        </div>
    </div>

    <script>
        function searchMedia(platform) {
            const query = document.getElementById('media-search').value;
            if (!query) return;
            let url = '';
            if (platform === 'youtube') url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
            window.open(url, '_blank');
        }

        function sendVoiceCommand(command) {
            // Just a visual feedback, the real action is done via the main assistant
            alert(`Say "${command}" to the assistant!`);
        }

        document.getElementById('media-search').addEventListener('keydown', e => {
            if (e.key === 'Enter') searchMedia('youtube');
        });
    </script>
</body>
</html>
